spring:
  autoconfigure:
    exclude: org.springframework.ai.vectorstore.elasticsearch.autoconfigure.ElasticsearchVectorStoreAutoConfiguration
  application:
    name: nexa
  profiles:
    active: dev
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://accounts.google.com
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:postgresql://localhost:5432/nexa
    driver-class-name: org.postgresql.Driver
    username: root
    password: root
    hikari:
      maximum-pool-size: 15
      connection-timeout: 30000
      minimum-idle: 5
  jpa:
    database: POSTGRESQL
    show-sql: true
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
        implicit-strategy: jpa
    properties:
      javax:
        persistence:
          validation:
            mode: none
      hibernate:
        format_sql: true
        highlight_sql: true
        order_updates: true
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000
      client-type: lettuce
  flyway:
    clean-disabled: false
    enabled: true

  elasticsearch:
    uris: http://localhost:9200
server:
  port: 8080


frontend:
  host:
    address: http://localhost:4200

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,env,bean,info,prometheus,modulith
  endpoint:
    health:
      probes:
        enabled: true
      show-details: ALWAYS


actuator:
  user:
    name: admin
    password: admin
    roles: OPS


