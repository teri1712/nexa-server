spring:
  docker:
    compose:
      enabled: false
  ai:
    model:
      chat: ollama
      embedding:
        text: ollama
    ollama:
      base-url: http://localhost:11434
      init:
        pull-model-strategy: when_missing
      chat:
        model: qwen3:0.6b
        options:
          temperature: 0.5
      embedding:
        model: nomic-embed-text
logging:
  level:
    root: DEBUG

aws:
  s3:
    access:
      id: test
      secret: test
