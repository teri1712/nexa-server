spring:
  docker:
    compose:
      enabled: false
  datasource:
    url: jdbc:postgresql://${DB_HOST}/nexa
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  elasticsearch:
    uris: ${ELASTICSEARCH_URL}
    username: ${ELASTICSEARCH_USERNAME}
    password: ${ELASTICSEARCH_PASSWORD}

loki:
  url: ${LOKI_URL}

management:
  otlp:
    tracing:
      endpoint: ${TEMPO_ENDPOINT}

faq:
  sidecar:
    url: ${FAQ_SIDECAR_URL}

graph:
  sidecar:
    url: ${GRAPH_SIDECAR_URL}
  poll:
    interval: 1m

jwt:
  duration: 30m
  refresh:
    duration: 7d

logging:
  level:
    root: INFO


aws:
  s3:
    bucket: ${S3_BUCKET}
    access:
      id: ${S3_ACCESS_KEY}
      secret: ${S3_SECRET_KEY}
    endpoint: ${S3_ENDPOINT}
    public-endpoint: ${S3_PUBLIC_ENDPOINT}

frontend:
  host:
    address: ${FRONTEND_HOST}